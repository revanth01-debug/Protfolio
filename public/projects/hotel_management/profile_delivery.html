<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Delivery</title>
<style>
/* Body Styling */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #fefcea, #f1da36);
  color: #333;
}

/* Navbar Styling */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #ff6f61;
  padding: 10px 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  position: sticky;
  top: 0;
  z-index: 1000;
}

nav .logo {
  font-size: 1.8em;
  font-weight: bold;
  color: #fff;
  text-shadow: 1px 1px 2px #00000050;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 20px;
}

nav ul li a {
  text-decoration: none;
  color: #fff;
  font-weight: 500;
  transition: 0.3s;
}

nav ul li a.active, nav ul li a:hover {
  color: #ffd700;
  transform: scale(1.1);
}

/* Container Styling */
.container {
  max-width: 500px;
  margin: 50px auto;
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

.container h2 {
  font-size: 2em;
  color: #ff6f61;
  margin-bottom: 20px;
}

/* Profile info styling */
.container p {
  font-size: 1.1em;
  margin: 15px 0;
}

.container button {
  background: #ff6f61;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 1em;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.container button:hover {
  background: #ff3b2e;
  transform: scale(1.05);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<nav>
  <div class="logo">🍕 FoodieHub</div>
  <ul>
    <li><a href="home_delivery.html">Home</a></li>
    <li id="navbar"></li>
    <li><a href="#" onclick="logoutUser()">Logout</a></li>
  </ul>
</nav>

<div class="container">
  <h2>Your Delivery Profile</h2>
  <p>Email: <span id="profileEmail"></span></p>
  <button onclick="changePassword()">Change Password</button>
</div>

<script>
// Navbar greeting
function loadNavbar() {
    const navbar = document.getElementById('navbar');
    let userEmail = localStorage.getItem('userEmail') || 'Delivery';
    navbar.innerHTML = `<span style="color: #fff; font-weight:bold;">Hello, ${userEmail.split('@')[0]}!</span>`;
}

// Load profile info
function loadProfile() {
    const email = localStorage.getItem('userEmail') || 'Not Logged In';
    document.getElementById('profileEmail').innerText = email;
}

// Logout
function logoutUser() {
    localStorage.clear();
    window.location.href = "login.html";
}

// Change password placeholder
function changePassword() {
    alert("Password change functionality coming soon!");
}

loadNavbar();
loadProfile();
</script>
</body>
</html>
