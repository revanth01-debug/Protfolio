<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders | Customer</title>
<style>
/* Body and General Styling */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #fefcea, #f1da36);
  color: #333;
}

/* Navbar Styling */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #ff6f61;
  padding: 10px 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  position: sticky;
  top: 0;
  z-index: 1000;
  height:60px;
}

nav .logo {
  font-size: 1.8em;
  font-weight: bold;
  color: #fff;
  text-shadow: 1px 1px 2px #00000050;
}
nav img {
  height: 40px; /* avatar size */
  border-radius: 50%;
}
nav ul {
  list-style: none;
  display: flex;
  gap: 20px;
}

nav ul li a {
  text-decoration: none;
  color: #fff;
  font-weight: 500;
  transition: 0.3s;
}

nav ul li a.active, nav ul li a:hover {
  color: #ffd700;
  transform: scale(1.1);
}

/* Container Styling */
.container {
  max-width: 900px;
  margin: 50px auto;
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.container h2 {
  font-size: 2em;
  color: #ff6f61;
  margin-bottom: 20px;
  text-align: center;
}

/* Order List Styling */
#ordersList p {
  background: #fff3e0;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 5px solid #ff6f61;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  transition: transform 0.2s, box-shadow 0.2s;
}

#ordersList p:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

#ordersList p span {
  display: block;
}

.empty-orders {
  text-align: center;
  font-size: 1.2em;
  color: #555;
  margin-top: 30px;
}
</style>
</head>
<body>

<nav>
  <div class="logo">🍕 FoodieHub</div>
  <ul>
    <li><a href="home_customer.html">Home</a></li>
    <li><a href="menu_customer.html">Menu</a></li>
    <li><a href="cart_customer.html">Cart</a></li>
    <li><a href="orders_customer.html" class="active">Orders</a></li>
    <li id="navbar"></li>
    <li><a href="#" onclick="logoutUser()">Logout</a></li>
  </ul>
</nav>


<div class="container">
  <h2>Your Orders</h2>
  <div id="ordersList"></div>
</div>

<script src="script.js"></script>
<script>
loadNavbar();

function loadOrders(){
    const orders = JSON.parse(localStorage.getItem("orders")) || [];
    const div = document.getElementById("ordersList");
    if(orders.length===0){ 
        div.innerHTML="<p class='empty-orders'>No orders yet </p>"; 
        return; 
    }
    div.innerHTML="";
    orders.forEach(order=>{
        div.innerHTML += `<p>Order#${order.id} - ₹${order.total_amount} - Status: ${order.status}</p>`;
    });
}
loadOrders();
</script>

</body>
</html>
